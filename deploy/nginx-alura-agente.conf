# Configuración de nginx como proxy inverso para el Alura Agente.
# Copiar a: /etc/nginx/sites-available/alura-agente
# Reemplaza TU_DOMINIO por tu dominio real (ej. bianca-alura.duckdns.org).
#
# El bloque HTTPS (puerto 443) lo agrega automáticamente Certbot al obtener el
# certificado; aquí solo definimos el puerto 80.

server {
    listen 80;
    server_name TU_DOMINIO;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # las respuestas del agente pueden tardar unos segundos
    }
}
